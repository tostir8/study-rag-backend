name: Backend CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      APP_NAME: Study RAG Backend

      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: study_rag
      POSTGRES_USER: study_user
      POSTGRES_PASSWORD: study_password

      CHROMA_HOST: localhost
      CHROMA_PORT: "8000"

      LLM_PROVIDER: groq
      LLM_MODEL: llama-3.3-70b-versatile

      GROQ_API_KEY: fake-api-key-for-ci

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FastAPI import
        run: |
          python -c "from app.main import app; print('FastAPI OK')"
